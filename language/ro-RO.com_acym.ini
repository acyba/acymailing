ACYM_LIST_UNSUBSCRIBE_HANDLING_DESC="Componenta poate adăuga un header 'List-Unsubscribe' la buletinele informative trimise pentru a permite abonailor să se dezaboneze ușor și pentru a nu fi considerat(ă) spammer. Aceasta vă trimite un email cu conținutul 'Vă rog să dezabonați abonatul cu ID-ul xxx'. Această regulă bounce va procesa automat acest tip de e-mail-uri, astfel că nu e nevoie să dezabonați utilizatorii manual."
ACYM_SUPPRESSION_LIST_DESC="Această regulă va procesa automat răspunsul Amazon SES, atunci când expedierea unui mesaj este blocată din cauza faptului că acel utilizator se află pe lista lor neagră. Implicit, această regulă va dezactiva acest abonat din lista dvs."
ACYM_ACTION_REQUIRED_DESC="Această regulă va acționa asupra mesajelor care necesită o acțiune din partea dvs. Acest fel de mesaje necesită să fie procesate manual; le puteți redirecționa unui webmaster, care le poate procesa manual. Implicit, această regulă va procesa toate auto-replicile, cum ar fi „CLic aici ca să confirmi că ești om” sau „Dați o replică acestui buletin informativ, lăsând subietul neschimbat”."
ACYM_ACKNOWLEDGMENT_RECEIPT_SUBJECT_DESC="Această regulă va șterge mesaje de înștiințare cum ar fi 'Sunt în vacanță' sau 'Mulțumesc pentru mesaj' din subiectul acestuia. Implicit, dorim pur să simplu să ignorăm acest fel de mesaje. Acestea vor fi identificate doar pe baza subiectului lor."
ACYM_FEEDBACK_LOOP_DESC="Această regulă va procesa plângeri de tipul 'feedback loop'."
ACYM_FEEDBACK_LOOP_BODY_DESC="Această regulă va procesa plângeri de tipul 'feedback loop' atunci când mesajul este localizat în corpul emailului respins."
ACYM_MAILBOX_FULL_DESC="Această regulă va procesa mesaje nelivrate din cauza faptului că inboxul destinatarului este plin. Implicit, nu dorim să blocăm acest abonat imediat. Componenta va aștepta 3 mesaje soft bounce înainte de a efectua o acțiune asupra acestui abonat."
ACYM_BLOCKED_GOOGLE_GROUPS_DESC="Această regulă va procesa mesaje bounce blocate de Google Groups."
ACYM_REJECTED_DESC="Această regulă va procesa mesajele respinse de serverul destinatarului"
ACYM_MAILBOX_DOESNT_EXIST_1_DESC="Această regulă va procesa mesaje bounce ce indică faptul că nu s-a putut contacta căsuța de mesaje pentru că aceasta nu există."
ACYM_MESSAGE_BLOCKED_RECIPIENTS_DESC="Această regulă va procesa mesaje care nu au putut fi livrate din cauză că mesajele dvs. au fost blocate de un filtru. Implicit, componenta vă va redirecționa aceste mesaje, pentru a putea investiga problema."
ACYM_MAILBOX_DOESNT_EXIST_2_DESC="Această regulă va procesa mesaje bounce ce indică faptul că mesajele nu au putut ajunge în căsuța de emailuri din cauză că aceasta nu există. Ambele reguli sunt necesare pentru a procesa majoritatea mesajelor bounce de acest tip."
ACYM_DOMAIN_NOT_EXIST_DESC="Această regulă va procesa mesaje bounce ce indică faptul că acestea nu au putut ajunge în căsuța de email din cauză că domeniul nu există. Căsuța poștală sau domeniul destinatarului nu există, astfel că, implicit, vom bloca imediat utilizatorul de la faptul de a mai fi contactat."
ACYM_TEMPORARY_FAILURES_DESC="Această regulă va procesa alte soft bounces, cum ar fi indisponibilitatea temporară a căsuței de email a destinatarilor. Implicit, componenta va acționa doar asupra abonatului dacă primește cel puțin 3 bounces de la acest utilizator."
ACYM_FAILED_PERM_DESC="Această regulă se va ocupa de ceea ce numim 'hard bounces'. Va procesa mesajele care nu au putut fi procesate de regulile anterioare 'The mailbox does not exist' and 'The domain does not exist'."
ACYM_ACKNOWLEDGMENT_RECEIPT_BODY_DESC="Această regulă va elimina mesajele de înștiințare, cum ar fi „Vă mulțumim pentru că ne contactați...”, dacă acestea sunt incluse în corpul mesajului respins. Acesta va fi detectat doar pe baza corpului mesajului."
ACYM_FINAL_RULE_DESC="Această regulă va fi executată dacă un mesaj nu este supus niciuneia dintre regulile anterioare. Implicit, acest fel de mesaj este redirecționat spre adresa dvs. de email, astfel că îl puteți procesa manual sau puteți îmbunătăți regulile pentru a fi procesat automat."
