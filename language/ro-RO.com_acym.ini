ACYM_WHAT_IS_BOUNCE_HANDLING="Ce este administrarea mesajelor bounce?"
ACYM_WHAT_IS_BOUNCE_HANDLING_TEXT="Această pictogramă este cea mai bună pentru a ilustra procesul de respingere a mesajelor (bounce). <br />De fapt, știți deja ce este. Cunoașteți „Delivery Status Notification (Failure)”, nu?! <br />Pe scurt, uneori, după trimiterea unui e-mail primiți unul care spune că mesajul dvs. nu a fost trimis dintr-un anumit motiv. <br />Mesajele de vacanță/auto-replică, mesajul dvs. a fost blocat de serverul de e-mail al destinatarului, adresa de e-mail a destinatarului nu există, și așa mai departe..."
