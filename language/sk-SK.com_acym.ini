ACYM_WHAT_IS_BOUNCE_HANDLING="Čo je bounce handling?"
ACYM_WHAT_IS_BOUNCE_HANDLING_TEXT="Táto ikona najlepšie znázorňuje proces bounce.<br />V skutočnosti už viete, čo to je. &quot;Oznámenie o stave doručenia (neúspešné)&quot; poznáte to, však?<br />Skrátka, niekedy po odoslaní e-mailu dostanete takú správu, ktorá hovorí, že vaša správa nebola z nejakého dôvodu doručená.<br />Výpoveď/Automatická odpoveď, váš e-mail bol zablokovaný e-mailovým serverom príjemcu, e-mailová adresa príjemcu neexistuje a tak ďalej..."
ACYM_WHAT_ARE_THE_RISKS_BOUNCES="Aké sú riziká?"
ACYM_WHAT_ARE_THE_RISKS_BOUNCES_TEXT="Poštové servery vás začnú považovať za SPAM, pretože dostávate príliš veľa odmietnutých e-mailov.<br />Ak to nezoptimalizujete, vaše e-maily už nebudú prijímané. To je také jednoduché!"
ACYM_HOW_ACYMAILING_CAN_HELP="Ako môže AcyMailing pomôcť?"
ACYM_HOW_ACYMAILING_CAN_HELP_TEXT="Funkcia Bounce handling umožňuje zastaviť odosielanie e-mailov neplatným príjemcom a zastaviť prijímanie odmietnutých správ, aby sa nepovažovali za SPAM.<br />Tu sú niektoré akcie, ktoré budete môcť definovať:<br /> - Odstránenie používateľa z príjemcov, keď jeho e-mailová adresa neexistuje <br /> - Preposlanie správy na vašu e-mailovú adresu, keď ide o správu o dovolenke/automatickej odpovedi <br /> - Odhlásenie používateľov zo zoznamu <br /> - Mnoho ďalších ..."
