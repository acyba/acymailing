ACYM_WHAT_ARE_SEGMENTS="Čo sú segmenty?"
ACYM_WHAT_ARE_SEGMENTS_DESC="Segmentácia e-mailov umožňuje rozdeliť vašu databázu a vytvoriť zoznamy podľa rôznych kritérií.<br /> Segmentácia vám umožňuje prispôsobiť obsah rôznym typom používateľov.<br /> Môžete segmentovať podľa profilu zákazníka. Je na vás, aby ste si vybrali, podľa akých kritérií budete svoj zoznam segmentovať.<br />Tieto kritériá môžu byť založené na akýchkoľvek vlastných poliach, ktoré ste vytvorili, a na mnohých ďalších filtroch (štatistiky, predplatné, nákupy...)."
ACYM_WHY_USE_SEGMENTS="Prečo používať segmenty?"
ACYM_WHY_USE_SEGMENTS_DESC="<b>Segmenty vám umožnia osloviť správnu cieľovú skupinu v správnom čase vo vašich e-mailových kampaniach.</b><br />Dva hlavné dôvody, prečo segmentovať e-maily:<br /><b>- Zlepšenie miery otvorenia</b><br />Vaši zákazníci budú s väčšou pravdepodobnosťou klikať na váš obsah, ak bude prispôsobený ich potrebám a správaniu.<br /><b>- Vytvorenie/personalizácia vzťahu so zákazníkmi</b><br />Segmentácia zákazníkov vám umožní vytvoriť skutočný vzťah so zákazníkmi vytvorením jedinečných a cielených kampaní podľa profilu a preferencií každého používateľa.<br />Segmentácia vytvára cestu zákazníka vašou e-mailovou kampaňou."
ACYM_SUMMARY_NUMBER_RECEIVERS_DESC="Toto je počet všetkých používateľov prihlásených do zoznamov a segmentov prepojených s touto kampaňou. Niektorí používatelia môžu byť prihlásení do viacerých zoznamov, ale v tomto súčte sú započítaní len raz."
ACYM_YOUR_CUSTOM_SEGMENT="Váš vlastný segment"
ACYM_CONDITIONS_DESC="Automatizácia sa spustí len vtedy, ak sú splnené podmienky, ktoré ste vybrali. Tieto podmienky sa nemusia týkať účastníkov, na ktorých sa akcie použijú."
ACYM_REQUIRED_DESC="Vlastné pole bude povinné, keď sa zobrazí vo formulári predplatného. Táto možnosť nie je aktívna v administrátorskej časti vášho webu."
ACYM_AUTO_SEND_PROCESS_DESC="Odoslanie e-mailov trvá určitý čas, nezvyšujte príliš počet odoslaných e-mailov v jednej dávke, inak váš server nebude schopný držať krok."
ACYM_UPLOAD_FOLDER_DESC="Priečinok, do ktorého budú prílohy nahrané. Môžete použiť skratky ako {groupname} alebo {userid}, aby ste mali konkrétny priečinok pre jednotlivé skupiny používateľov / používateľov."
ACYM_ALLOWED_FILES_DESC="Toto obmedzenie sa uplatňuje pri pokuse o nahratie súborov v AcyMailingu, ako sú prílohy alebo obrázky v editore alebo v poli vlastného súboru."
ACYM_CLICK_HERE_TO_CREATE="Kliknutím sem ho vytvoríte"
ACYM_DELETE_DETAILED_STATS_AFTER_DESC="Podrobné štatistiky ukazujú, ktorí odberatelia otvorili e-maily, klikli na odkazy v nich, odhlásili sa z nich alebo vrátili spätný e-mail."
ACYM_TRACKINGSYSTEM_EXTERNAL_LINKS_DESC="Pri vkladaní odkazov do e-mailov si môžete vybrať sledovanie kliknutí na odkazy smerujúce mimo vašej webovej lokality."
ACYM_TRACKINGSYSTEM_GA_DESC="Pri sledovaní kliknutí pomocou služby Google Analytics sa k odkazom v odoslaných e-mailoch pridajú parametre utm_campaign, utm_medium a utm_source."
ACYM_TRACKINGSYSTEM_ACY_DESC="Pri sledovaní kliknutí pomocou AcyMailing sa odkazy v odoslaných e-mailoch nahradia prechodným odkazom, ktorý presmeruje na pôvodný odkaz."
ACYM_CONNECTION_METHOD_DESC="Odporúčame pripojenie IMAP, ale pre istotu si overte dokumentáciu poskytovateľa bounce adresy."
ACYM_BOUNCE_PORT_DESC="Toto pole môžete nechať prázdne, ak neviete, čo použiť. Vo väčšine prípadov to bude 993 pre IMAP a 995 pre POP3 pri použití zabezpečeného pripojenia alebo 143 pre IMAP a 110 pre POP3."
ACYM_AUTOMATED_TASKS_DESC="Aktiváciou tejto možnosti povolíte automatizované úlohy, ako je proces odosielania, automatizácia, spracovanie odozvy, denné úlohy atď..."
ACYM_ALLOW_MODIFICATION_DESC="Ak je vybraná možnosť &quot;Yes&quot;, ktokoľvek bude môcť upravovať polia odberu a vlastné polia zadaním e-mailovej adresy vo formulári odberu. Použite to len vtedy, keď vaši odberatelia nemusia mať účet na vašej webovej lokalite."
ACYM_REQUIRE_CONFIRMATION_DESC="Ak je táto možnosť aktivovaná, noví používatelia dostanú e-mail so žiadosťou o potvrdenie svojej e-mailovej adresy. Toto potvrdenie už nie je potrebné, ak sa používateľ neskôr prihlási do iných zoznamov"
ACYM_DAILY_TASKS_DESC="Denné úlohy môžu byť automatizácie spúšťané raz denne, denné následné kontroly, narodeninové e-maily..."
ACYM_SPECIAL_CHARS_DESC="Ak aktivujete túto možnosť, kontrola formátu e-mailu bude menej obmedzujúca a umožní napríklad cyriliku, hebrejské alebo čínske znaky."
ACYM_SMTP_SECURE_DESC="Ak ste vybrali port 465, vyberte možnosť SSL. Ak ste vybrali port 587, vyberte TLS. V prípade akéhokoľvek iného portu nechajte túto možnosť prázdnu."
ACYM_SMTP_PORT_DESC="Port je spravidla 465 alebo 587, pozrite si dokumentáciu smtp služby, ktorú ste si vybrali. Kliknutím na odkaz nižšie sa uistite, že port, ktorý potrebujete, je povolený vaším hostiteľom."
ACYM_SMTP_PASSWORD_DESC="Toto je zvyčajne heslo vašej e-mailovej adresy alebo kľúč API poskytnutý vybranou odosielacou službou."
ACYM_SMTP_USERNAME_DESC="Toto je zvyčajne e-mailová adresa alebo používateľské meno, ktoré poskytuje služba odosielania, ktorú ste si vybrali."
ACYM_SMTP_AUTHENTICATION_DESC="Aktivácia tejto možnosti, ak vaša odosielacia služba vyžaduje zadanie používateľského mena a hesla na odosielanie e-mailov."
ACYM_SMTP_ALIVE_DESC="Ak je vypnuté, AcyMailing sa medzi každým odoslaným e-mailom odpojí od odosielacej služby, ktorú ste vybrali. Ak to vaša odosielacia služba umožňuje, je lepšie ponechať túto možnosť aktívnu."
ACYM_SMTP_SERVICE="Externá služba (SMTP)"
ACYM_PHPMAIL_FUNCTION="Váš server (PHP Mail Function)"
ACYM_BOUNCE_ADDRESS_DESC="Niekedy sa e-maily nedostanú k príjemcovi (e-mailová adresa neexistuje, schránka je plná atď...). Keď sa to stane, informačný e-mail sa odošle na vašu &quot;Od e-mailu&quot;, ale pomocou tejto možnosti si môžete vybrať inú e-mailovú adresu, na ktorú chcete túto správu dostávať."
