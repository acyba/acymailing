ACYM_REPLYTO_DESC="Informácie &quot;Reply-to&quot; sa môžu líšiť od informácií &quot;From&quot;. Ak účastník stlačí tlačidlo &quot;Odpovedať&quot; vo svojom poštovom klientovi, odošle e-mail na vami zadanú adresu &quot;Reply-to&quot; namiesto adresy &quot;From&quot;."
