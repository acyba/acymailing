ACYM_AUTOMATED_TASKS_DESC="Aktivirajte to možnost, da omogočite avtomatizirana opravila, kot so postopek pošiljanja, avtomatizacija, obdelava odbijanja, dnevna opravila itd ..."
ACYM_ALLOW_MODIFICATION_DESC="Če je izbran &quot;Da&quot;, bo lahko kdorkoli spreminjal polja za naročnino in po meri tako, da bo v naročnino vpisal e-poštni naslov. Uporabite ga le, če naročniki na vašem spletnem mestu nimajo računa."
ACYM_REQUIRE_CONFIRMATION_DESC="Če je ta možnost aktivirana, bodo novi uporabniki prejeli e-pošto z zahtevo, da potrdijo svoj e-poštni naslov. Ta potrditev ni več potrebna, če se uporabnik pozneje naroči na druge sezname"
ACYM_DAILY_TASKS_DESC="Vsakodnevna opravila so lahko avtomatizirajo, katera se sprožijo enkrat na dan, to so vsakodnevni nadaljnji pregledi, e-poštna sporočila ob rojstnih dnevih ..."
ACYM_SPECIAL_CHARS_DESC="Če aktivirate to možnost, bodo preverjanja formatov e-pošte manj omejevalna in bodo na primer omogočala cirilico, slovenščino, hebrejščino ali kitajščino."
ACYM_SMTP_SECURE_DESC="Če ste izbrali vrata 465, izberite SSL. Če ste izbrali vrata 587, izberite TLS. Za katerakoli druga vrata pustite to možnost prazno."
ACYM_SMTP_PORT_DESC="Vrata so običajno 465 ali 587. Preverite dokumentacijo SMTP izbrane storitve pošiljanja. Kliknite spodnjo povezavo in se prepričajte, da gostitelj dovoli vrata, ki jih potrebujete."
