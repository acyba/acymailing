ACYM_WHAT_IS_BOUNCE_HANDLING_TEXT="Ta ikona je najboljša za ponazoritev zavrnitve.<br />Pravzaprav že veste, kaj je to.  &quot;Obvestilo o statusu dostave (napaka)&quot; Ali veste, da je to, tako?<br />Skratka, včasih po pošiljanju e-pošte prejmete sporočilo, da sporočilo ni bilo dostavljeno iz nekega razloga.<br />Sporočilo o odsotnosti/samodejni odgovor, vaš e-poštni strežnik je blokiral e-poštni strežnik, e-poštni naslov prejemnika ne obstaja in tako naprej ..."
