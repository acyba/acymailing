ACYM_LIST_UNSUBSCRIBE_HANDLING_DESC="AcyMailing lahko poslanim e-poštnim sporočilom doda glavo 'Seznam odjave', da vašim uporabnikom omogoči enostavno odjavo in prepreči, da bi vas obravnavali kot pošiljatelja neželene pošte. To vam pošlje e-poštno sporočilo 'Prosim, odjavite se z ID-jem uporabnika xxx'. To pravilo o zavrnitvi samodejno obravnava to vrsto e-pošte, tako da vam ni treba ročno odjaviti uporabnikov."
ACYM_SUPPRESSION_LIST_DESC="To pravilo bo samodejno obravnavalo odziv Amazon SES, ko je pošiljanje e-pošte zavrnjeno, ker je uporabnik na njihovem črnem seznamu. To pravilo bo samodejno onemogočilo tega uporabnika z vašega seznama."
ACYM_ACTION_REQUIRED_DESC="To pravilo se bo izvajalo za sporočila, ki zahtevajo ukrepanje z vaše strani. S tovrstnimi sporočili je treba ravnati ročno, lahko jih posredujete spletnemu skrbniku in jih upravljate enega po enega. To pravilo bo privzeto obravnavalo vse samodejne odgovore, kot je 'kliknite tukaj, da potrdite, da ste človek in ne robot' ali 'odgovorite na to sporočilo, pri čemer ne spreminjajte zadeve'."
ACYM_ACKNOWLEDGMENT_RECEIPT_SUBJECT_DESC="To pravilo bo iz vrstice z zadevo odstranilo obvestila, kot sta 'sem na dopustu' ali 'hvala za vaše sporočilo'. Privzeto jih preprosto želimo ignorirati. Zaznan bo le na podlagi vrstice z zadevo."
ACYM_FEEDBACK_LOOP_DESC="To pravilo bo obravnavalo pritožbe glede povratne zanke."
ACYM_FEEDBACK_LOOP_BODY_DESC="To pravilo bo obravnavalo pritožbe glede povratne zanke, ko se sporočilo nahaja v telesu zavrnjenega e-poštnega sporočila."
ACYM_MAILBOX_FULL_DESC="To pravilo bo obravnavalo nedostavljena sporočila, ker je prejemnikov nabiralnik poln. Privzeto tega uporabnika ne želimo takoj blokirati. AcyMailing bo počakal na 3 mehka zavrnjena sporočila, preden bo ukrepal glede tega naročnika."
ACYM_BLOCKED_GOOGLE_GROUPS_DESC="To pravilo bo obravnavalo zavrnitve, ki jih povzroči blokiranje Google skupin."
ACYM_REJECTED_DESC="To pravilo bo obravnavalo sporočila, ki jih je zavrnil prejemnikov strežnik."
ACYM_MAILBOX_DOESNT_EXIST_1_DESC="To pravilo bo obravnavalo zavrnjena sporočila, ki kažejo, da nabiralnika ni mogoče doseči, ker ne obstaja."
ACYM_MESSAGE_BLOCKED_RECIPIENTS_DESC="To pravilo bo obravnavalo sporočila, ki jih ni bilo mogoče dostaviti, ker je vaše sporočilo blokiral filter. Acymailing vam bo privzeto posredoval ta sporočila, da boste lahko raziskali težavo."
ACYM_MAILBOX_DOESNT_EXIST_2_DESC="To pravilo bo obravnavalo zavrnjena sporočila, ki kažejo, da nabiralnika ni mogoče doseči, ker ne obstaja. Obe pravili sta potrebni za pokrivanje večine zavrnjenih sporočil te vrste."
ACYM_DOMAIN_NOT_EXIST_DESC="To pravilo bo obravnavalo zavrnjena sporočila, ki kažejo, da nabiralnik ni dosegljiv, ker ime domene ne obstaja. Nabiralnik ali prejemnikova domena ne obstaja, zato bo privzeto takoj blokirana ponovno vzpostavitev stika z uporabnikom."
ACYM_TEMPORARY_FAILURES_DESC="To pravilo bo obravnavalo druge mehke zavrnitve, kot je začasna nedosegljivost prejemnikovega nabiralnika. Privzeto bo AcyMailing ukrepal proti naročniku samo, če od tega uporabnika prejme vsaj 3 mehke zavrnitve."
ACYM_FAILED_PERM_DESC="To pravilo bo obravnavalo tako imenovane 'težke zavrnitve'. Obdeloval bo sporočila, ki jih s prejšnjima praviloma 'Nabiralnik ne obstaja' in 'Domena ne obstaja' nismo mogli zabeležiti."
ACYM_ACKNOWLEDGMENT_RECEIPT_BODY_DESC="To pravilo bo odstranilo sporočila z obvestili, kot je 'hvala, ker ste nas kontaktirali ...', če so vključena v telo zavrnjenega e-poštnega sporočila. Zazna se le na podlagi telesa."
ACYM_FINAL_RULE_DESC="To pravilo bo izvedeno, če se sporočilo ne ujema z nobenim od prejšnjih pravil. Privzeto je tovrstno sporočilo preusmerjeno na vaš e-poštni naslov, tako da ga lahko ročno obdelate ali izboljšate pravila za samodejno obravnavanje."
