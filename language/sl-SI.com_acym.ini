ACYM_HOW_ACYMAILING_CAN_HELP_TEXT="Funkcija za ravnanje z zavnitvami omogoča prenehanje pošiljanje e-poštnih sporočil neveljavnim prejemnikom in prenehanje prejemanja e-poštnih sporočil, da se ne štejejo za SPAM.<br />Tukaj je nekaj dejanj, ki jih boste lahko definirali:<br /> - Izbrišite uporabnika iz seznama prejemnikov, kadar njegov e-poštni naslov ne obstaja <br /> - Sporočilo posredujte na vaš e-poštni naslov, kadar gre za odsotnost/samodejni odgovor <br /> - Odjavite naročnike iz seznama <br /> - In še veliko več ..."
