ACYM_WHAT_ARE_SEGMENTS="Kaj so segmenti?"
ACYM_WHAT_ARE_SEGMENTS_DESC="Segmentiranje e-poštnih sporočil omogoča razdelitev baze podatkov in ustvarjanje seznamov v skladu z različnimi merili.<br />Segmentacija vam omogoča, da svojo vsebino prilagodite različnim vrstam uporabnikov.<br />Segmentirate lahko glede na profil vaše stranke. Na vas je, da izberete, po katerih merilih boste segmentirali seznam.<br />Ta merila lahko temeljijo na poljubnih poljih, ki ste jih ustvarili, in številnih drugih filtrih (statistika, naročnine, nakupi ...)"
ACYM_WHY_USE_SEGMENTS="Zakaj uporabljati segmentacijo?"
ACYM_WHY_USE_SEGMENTS_DESC="<b>Segmenti vam omogočajo, da v svojih e-poštnih kampanjah ob pravem času dosežete pravi cilj.</b><br />Dva glavna razloga za segmentiranje e-pošte:<br /><b>- Izboljšajte stopnjo ocene</b><br />Vaše stranke bodo bolj verjetno kliknile vašo vsebino, če bo le ta prilagojena njihovim potrebam in vedenju.<br /><b>- Ustvarite/Prilagodite odnos s stranko</b><br />Segmentacija strank vam omogoča ustvarjanje resničnega odnosa s stranko z ustvarjanjem edinstvenih in ciljno usmerjenih kampanj glede na profil in želje vsakega uporabnika.<br />Segmentacija ustvari pot strank skozi vašo e-poštno kampanjo."
ACYM_SUMMARY_NUMBER_RECEIVERS_DESC="To je število vseh uporabnikov, ki so naročeni na sezname in segmente, povezane s to akcijo. Nekateri uporabniki so lahko naročeni na več seznamov, vendar se pri tem štejejo le enkrat."
ACYM_YOUR_CUSTOM_SEGMENT="Segment po meri"
ACYM_CONDITIONS_DESC="Avtomatizacija se bo sprožila le, če bodo izpolnjeni izbrani pogoji. Ti pogoji niso nujno potrebni za naročnike, za katere bodo dejanja uporabljena."
ACYM_REQUIRED_DESC="Polje po meri bo obvezno, če je prikazano na naročninskem obrazcu. Ta možnost ni aktivna v skrbniškem delu vašega spletnega mesta."
ACYM_AUTO_SEND_PROCESS_DESC="Za pošiljanje e-poštnih sporočil je potreben čas, zato ne povečujte preveč števila poslanih e-poštnih sporočil na paket, sicer vaš strežnik ne bo mogel slediti zahtevam."
ACYM_UPLOAD_FOLDER_DESC="Mapa, v katero bodo naložene priloge. Lahko uporabite kratke kode, kot so {groupname} ali {userid} za določeno mapo na uporabniško skupino / uporabnika."
ACYM_ALLOWED_FILES_DESC="Ta omejitev velja pri poskusu nalaganja datotek v AcyMailing, na primer prilog ali slik v urejevalniku ali polju po meri."
ACYM_CLICK_HERE_TO_CREATE="Kliknite tukaj za kreiranje"
ACYM_DELETE_DETAILED_STATS_AFTER_DESC="Podrobna statistika prikazuje, kateri naročniki so odprli e-pošto, kliknili povezave v njih, se od njih odjavili ali vrnili e-poštno sporočilo."
ACYM_TRACKINGSYSTEM_EXTERNAL_LINKS_DESC="Pri vstavljanju povezav v e-poštna sporočila lahko sledite klikom na povezave, ki kažejo zunaj vašega spletnega mesta."
ACYM_TRACKINGSYSTEM_GA_DESC="Pri sledenju klikom s storitvijo Google Analytics bodo parametri utm_campaign, utm_medium in utm_source dodani povezavam v e-poštnih sporočilih, ki jih pošljete."
ACYM_TRACKINGSYSTEM_ACY_DESC="Ko sledite klikom z AcyMailing, bodo povezave v e-poštnih sporočilih, ki jih pošljete, nadomeščene s prehodno povezavo, ki preusmeri na prvotno povezavo."
ACYM_CONNECTION_METHOD_DESC="Priporočamo povezavo IMAP, vendar preverite dokumentacijo ponudnika naslova za odbijanje."
